# Advisory code review on every non-Dependabot PR, once when it opens
# (re-request after changes with a PR comment containing "@claude review").
# Runs the official code-review plugin - the same engine as the local
# /code-review skill - which verifies findings with subagents before
# posting them as inline PR comments. Deliberately a separate workflow
# from "CI": a review can never fail a check, block auto-merge, or wake
# the fixers.
name: Claude PR Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: read
  id-token: write

concurrency:
  group: pr-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  review:
    # One review per PR on open, not per push (subscription budget).
    # Humans re-request with "@claude review"; bot comments are ignored so
    # the lane can never retrigger itself off its own output. dependabot/*
    # is skipped: minors auto-merge on green CI and majors get the
    # MERGE/HOLD triage - a review comment there is noise. claude/* fixer
    # and agent task PRs ARE reviewed - that is the independent-review
    # step before the human reads the diff.
    if: >
      (github.event_name == 'pull_request' &&
       github.event.pull_request.head.repo.full_name == github.repository &&
       !startsWith(github.event.pull_request.head.ref, 'dependabot/')) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       github.event.comment.user.type != 'Bot' &&
       contains(github.event.comment.body, '@claude review'))
    runs-on: ubuntu-latest
    steps:
      # Full history so the review subagents can read surrounding code and
      # git context, not just the diff hunks.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: "https://github.com/anthropics/claude-code.git"
          plugins: "code-review@claude-code-plugins"
          # --comment is load-bearing: without it the plugin reviews but
          # never posts (step 7 of its command: "If --comment was NOT
          # provided, stop here. Do not post any GitHub comments.").
          # With it, findings become inline comments; a clean review posts
          # a summary comment.
          prompt: "/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number || github.event.issue.number }} --comment"
          # No --allowedTools: the plugin declares its own tool allowlist and
          # its subagent fan-out breaks under a hand-built prefix list
          # (verified live: 8 permission denials, review produced nothing).
          # Read-only is enforced structurally instead - the job token has
          # contents: read, so a push is impossible; pull-requests: write
          # limits output to comments.
          claude_args: >
            --model claude-opus-4-8
            --max-turns 30

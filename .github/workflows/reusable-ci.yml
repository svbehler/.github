name: Reusable TypeScript CI

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "24"
      # Set to false for repos whose "test" script is e2e-only (needs a
      # running app/browser/database that plain CI does not provide).
      run-tests:
        type: boolean
        default: true
      # Set to false to skip the changeset-scoped fallow audit lane.
      run-fallow:
        type: boolean
        default: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4 # reads version from "packageManager" in package.json
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run --if-present lint
      - run: pnpm run --if-present typecheck
      - if: ${{ inputs.run-tests }}
        run: pnpm run --if-present test
      - run: pnpm run --if-present check
      - run: pnpm run --if-present build

  # Changeset-scoped code-health audit: dead code, complexity, and
  # duplication introduced by the PR's changed files (fallow's new-only
  # gate — pre-existing issues never fail it). PR-only: a push has no base
  # branch to diff against. Non-blocking observation period since
  # 2026-07-16: continue-on-error keeps a red verdict from failing the
  # workflow, which also means it never wakes the auto-fix layer. Once
  # precision is proven on real PRs, promote dead code to a gate by
  # dropping continue-on-error (keep complexity/dupes report-only via
  # severity rules in .fallowrc.json).
  fallow:
    if: ${{ inputs.run-fallow && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true
    steps:
      # Full history: fallow diffs against the merge-base with the PR's
      # base branch, which a shallow checkout does not contain.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          # setup-node v5 auto-enables caching for the package manager named
          # in package.json's packageManager field; this job never installs
          # pnpm, so the auto-cache's `pnpm store path` probe fails the step
          # ("Unable to locate executable file: pnpm", bc-to-datev #3).
          package-manager-cache: false
      # Static analysis only — no pnpm install needed (verified 2026-07-16
      # on a bare clone). Pinned to the 2.x major; bump deliberately.
      - run: npx --yes fallow@2 audit --base "origin/$GITHUB_BASE_REF"

name: Reusable TypeScript CI

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "24"
      # Set to false for repos whose "test" script is e2e-only (needs a
      # running app/browser/database that plain CI does not provide).
      run-tests:
        type: boolean
        default: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4 # reads version from "packageManager" in package.json
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run --if-present lint
      - run: pnpm run --if-present typecheck
      - if: ${{ inputs.run-tests }}
        run: pnpm run --if-present test
      - run: pnpm run --if-present check
      - run: pnpm run --if-present build

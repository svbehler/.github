# Merges Dependabot group PRs (minor+patch only) after CI succeeds.
# Majors arrive as individual PRs and are never auto-merged.
#
# GitHub's native auto-merge and required-check rulesets need GitHub Pro
# on private repos, so this merges explicitly on a green workflow_run
# instead of enabling auto-merge at PR-open time. If the account moves to
# Pro (or the repo goes public), the ruleset in scripts/rollout.sh adds
# server-side enforcement on top; this workflow keeps working either way.
name: Dependabot auto-merge

on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]' &&
      github.event.workflow_run.pull_requests[0] &&
      contains(github.event.workflow_run.head_branch, 'minor-and-patch')
    runs-on: ubuntu-latest
    steps:
      - run: gh pr merge --squash --repo "$REPO" "$PR_NUMBER"
        env:
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

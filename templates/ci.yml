# The workflow name "CI" is load-bearing: auto-fix-ci.yml and
# fix-dependabot.yml trigger on workflow_run for a workflow named "CI".
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: svbehler/.github/.github/workflows/reusable-ci.yml@main
    secrets: inherit
